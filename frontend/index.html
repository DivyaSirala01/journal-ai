<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Notes</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Notes</h1>
        <p>Write a note and AI will summarize, categorize, and set its priority.</p>
      </header>

      <section class="panel">
        <h2>New note</h2>
        <textarea
          id="new-note"
          placeholder="Write anything — a sentence, a task, or a longer note..."
        ></textarea>
        <div class="actions">
          <button class="btn btn-primary" id="add-btn">Add note</button>
        </div>
      </section>

      <div class="notes-header">
        <h2>Your notes</h2>
        <div class="notes-toolbar">
          <span class="count" id="note-count">0 notes</span>
          <button class="btn btn-danger btn-sm" id="delete-all-btn">Delete all</button>
        </div>
      </div>

      <div id="notes-list"></div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
